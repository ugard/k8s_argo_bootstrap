apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zmod-telegram
  namespace: argocd
spec:
  destination:
    namespace: zmod-telegram
    server: {{ .Values.spec.destination.server }}
  project: default
  source:
    path: apps/zmod-telegram
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}
