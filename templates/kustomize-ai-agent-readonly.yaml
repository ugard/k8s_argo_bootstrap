apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustomize-ai-agent-readonly
  namespace: argocd
spec:
  destination:
    namespace: ai-agent
    server: {{ .Values.spec.destination.server }}
  project: default
  source:
    path: apps/ai-agent-readonly
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}
