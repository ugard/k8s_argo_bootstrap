apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mqtt-internal
  namespace: argocd
spec:
  destination:
    namespace: mqtt-internal
    server: {{ .Values.spec.destination.server }}
  project: default
  source:
    path: apps/mqtt-internal
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: {{ .Values.spec.source.targetRevision }}
