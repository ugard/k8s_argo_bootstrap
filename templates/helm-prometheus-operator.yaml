apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  destination:
    namespace: monitoring
    server: {{ .Values.spec.destination.server }}
  project: default
  syncPolicy:
    syncOptions:
    # prometheus-operator CRDs przekraczaja limit 256KB annotacji
    # last-applied-configuration przy client-side apply
    - ServerSideApply=true
    # nie dotykaj zasobow ktore sa w sync (CRDs) — bez tego kazdy sync
    # próbuje patchowac ogromne CRDy i wywala sie na limicie annotacji
    - ApplyOutOfSyncOnly=true
  sources:
  - chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 75.15.1
    helm:
      release-name: kube-prometheus-stack
      valuesObject:
        defaultRules:
          create: true
          rules:
            # control-plane components not scraped on this cluster
            etcd: false
            kubeApiserverAvailability: false
            kubeApiserverBurnrate: false
            kubeApiserverHistogram: false
            kubeApiserverSlos: false
            kubeControllerManager: false
            kubeProxy: false
            kubeSchedulerAlerting: false
            kubeSchedulerRecording: false
            windows: false
        grafana:
          enabled: true
          defaultDashboardsEnabled: false
          ingress:
            enabled: true

            ## IngressClassName for Grafana Ingress.
            ## Should be provided if Ingress is enable.
            ##
            ingressClassName: kustomize-traefik

            ## Annotations for Grafana Ingress
            ##
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-cloudflare
              # kubernetes.io/ingress.class: nginx
              # kubernetes.io/tls-acme: "true"

            ## Labels to be added to the Ingress
            ##
            labels: {}

            ## Hostnames.
            ## Must be provided if Ingress is enable.
            ##
            # hosts:
            #   - grafana.domain.com
            hosts:
              - prom.ugard.win

            ## Path for grafana ingress
            path: /

            ## TLS configuration for Grafana Ingress
            ## Secret must be manually created in the namespace
            ##
            tls:
              - secretName: prom-general-tls
                hosts:
                - prom.ugard.win

            # # To make Grafana persistent (Using Statefulset)
            # #
            # persistence:
            #   enabled: true
            #   type: sts
            #   storageClassName: "rook-ceph-block"
            #   accessModes:
            #     - ReadWriteOnce
            #   size: 5Gi
            #   finalizers:
            #     - kubernetes.io/pvc-protection
        kubernetesServiceMonitors:
          enabled: true
        kubeApiServer:
          enabled: false
        kubelet:
          enabled: true
          serviceMonitor:
            interval: 60s
            cAdvisor: true
            # keep cardinality down: drop metrics unused by any rule/dashboard
            cAdvisorMetricRelabelings:
              - sourceLabels: [__name__]
                action: drop
                regex: container_(cpu_cfs_throttled_seconds_total|cpu_load_average_10s|cpu_system_seconds_total|cpu_user_seconds_total|file_descriptors|tasks_state|threads_max|memory_failures_total|memory_mapped_file)
              - sourceLabels: [__name__]
                action: drop
                regex: container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)
              - sourceLabels: [__name__]
                action: drop
                regex: container_spec.*
              # drop cgroup-only series that have no pod attached
              - sourceLabels: [id, pod]
                action: drop
                regex: '.+;'
        kubeControllerManager:
          enabled: false
        coreDns:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeStateMetrics:
          enabled: true
        kube-state-metrics:
          extraArgs:
            - --metric-labels-allowlist=persistentvolumeclaims=[*]
        nodeExporter:
          enabled: true
          hostRootFsMount:
            enabled: false
        prometheus-node-exporter:
          prometheus:
            monitor:
              attachMetadata:
                node: true
              relabelings:
              - action: replace
                sourceLabels: [__meta_kubernetes_node_name]
                targetLabel: node
        prometheusOperator:
          namespaces:
            releaseNamespace: true
            additional:
            - kube-system
            - garage
            - rook-ceph2
            - velero
            - cert-manager2
            - openebs
        alertmanager:
          extraSecretMounts:
          - name: ntfy-secret
            secretName: ntfy-alert-topic
            mountPath: /etc/alertmanager/ntfy
            readOnly: true
          config:
            global:
              resolve_timeout: 5m
            route:
              receiver: 'ntfy'
              routes:
              # dead man's switch: Watchdog zawsze sie pali i pinguje
              # healthchecks co ~10m; healthchecks alarmuje gdy pingi ustana
              - match:
                  alertname: Watchdog
                receiver: 'healthchecks-watchdog'
                group_wait: 0s
                group_interval: 5m
                repeat_interval: 10m
              # InfoInhibitor to techniczny always-firing alert stacka
              - match:
                  alertname: InfoInhibitor
                receiver: 'null'
              - match:
                  severity: info
                receiver: 'null'
              - match:
                  severity: critical
                receiver: 'ntfy'
            inhibit_rules:
            # nie duplikuj warning gdy critical o tym samym juz sie pali
            - source_matchers: ['severity = critical']
              target_matchers: ['severity = warning']
              equal: ['namespace', 'alertname']
            receivers:
            - name: 'ntfy'
              webhook_configs:
              - url: 'http://alert-webhook.monitoring/webhook'
                send_resolved: true
            - name: 'null'
            - name: 'healthchecks-watchdog'
              webhook_configs:
              - url: 'http://healthchecks.healthchecks.svc.cluster.local/ping/00049641-d7b9-468d-b772-806b84684f92'
                send_resolved: false
        prometheus:
          ingress:
            enabled: true
            ingressClassName: kustomize-traefik
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-cloudflare
            hosts:
              - monitoring.ugard.win
            paths:
              - /
            tls:
              - secretName: prometheus-ingress-tls
                hosts:
                  - monitoring.ugard.win
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            # pick up ALL PrometheusRules in watched namespaces (e.g. rook-ceph
            # ships its rules with label prometheus: rook-prometheus, which the
            # old prometheusRulesSelector — a nonexistent chart key anyway —
            # silently excluded)
            ruleSelectorNilUsesHelmValues: false
            retention: 10d
            retentionSize: 8GiB
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: rook-ceph-block
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
  - path: manifests/prometheus-rules
    repoURL: {{ .Values.spec.source.repoURL }}
    targetRevision: HEAD
