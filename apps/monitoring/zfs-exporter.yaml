---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zfs-exporter-script
data:
  exporter.py: |
    #!/usr/bin/env python3
    import subprocess
    from http.server import HTTPServer, BaseHTTPRequestHandler

    def get_metrics():
        try:
            out = subprocess.check_output(
                ['zfs', 'list', '-Hp', '-o', 'name,used,available', '-t', 'filesystem,volume'],
                text=True, stderr=subprocess.DEVNULL
            )
        except Exception as e:
            return f'# error: {e}\n'
        lines = [
            '# HELP zfs_dataset_used_bytes ZFS dataset used bytes',
            '# TYPE zfs_dataset_used_bytes gauge',
            '# HELP zfs_dataset_available_bytes ZFS dataset available bytes',
            '# TYPE zfs_dataset_available_bytes gauge',
        ]
        for line in out.strip().splitlines():
            parts = line.split('\t')
            if len(parts) < 3:
                continue
            name, used, available = parts[0], parts[1], parts[2]
            if '/pvc-' not in name:
                continue
            lbl = f'dataset="{name}"'
            if used.isdigit():
                lines.append(f'zfs_dataset_used_bytes{{{lbl}}} {used}')
            if available.isdigit():
                lines.append(f'zfs_dataset_available_bytes{{{lbl}}} {available}')
        return '\n'.join(lines) + '\n'

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == '/metrics':
                body = get_metrics().encode()
                self.send_response(200)
                self.send_header('Content-Type', 'text/plain; version=0.0.4')
                self.end_headers()
                self.wfile.write(body)
            else:
                self.send_response(404)
                self.end_headers()
        def log_message(self, *args):
            pass

    HTTPServer(('0.0.0.0', 9134), Handler).serve_forever()
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zfs-exporter
  labels:
    app: zfs-exporter
spec:
  selector:
    matchLabels:
      app: zfs-exporter
  template:
    metadata:
      labels:
        app: zfs-exporter
    spec:
      nodeSelector:
        openebs.io/zfs: "true"
      tolerations:
        - operator: Exists
      hostNetwork: true
      containers:
        - name: zfs-exporter
          image: docker.io/openebs/zfs-driver:2.9.0
          command: ["python3", "/scripts/exporter.py"]
          ports:
            - name: metrics
              containerPort: 9134
              hostPort: 9134
          securityContext:
            privileged: true
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: script
              mountPath: /scripts
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: dev
          hostPath:
            path: /dev
        - name: script
          configMap:
            name: zfs-exporter-script
---
apiVersion: v1
kind: Service
metadata:
  name: zfs-exporter
  labels:
    app: zfs-exporter
spec:
  clusterIP: None
  selector:
    app: zfs-exporter
  ports:
    - name: metrics
      port: 9134
      targetPort: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zfs-exporter
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: zfs-exporter
  endpoints:
    - port: metrics
      interval: 60s
      path: /metrics
