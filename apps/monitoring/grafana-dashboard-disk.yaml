apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-disk-usage
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  disk-usage.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "title": "Ephemeral Disks",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.7},
                  {"color": "red", "value": 0.9}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 14, "x": 0, "y": 1},
          "id": 2,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "expr": "1 - node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\",mountpoint=\"/var\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\",mountpoint=\"/var\"}",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "title": "Ephemeral (/var) Used %",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.7},
                  {"color": "red", "value": 0.9}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 10, "x": 14, "y": 1},
          "id": 3,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "targets": [
            {
              "expr": "1 - node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\",mountpoint=\"/var\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\",mountpoint=\"/var\"}",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "title": "Root FS Used % (Current)",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 24, "x": 0, "y": 9},
          "id": 13,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "expr": "node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\",mountpoint=\"/var\"}",
              "legendFormat": "{{node}} free",
              "refId": "A"
            }
          ],
          "title": "Ephemeral (/var) Free Space",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 13},
          "id": 4,
          "title": "ZFS Pools",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 14, "x": 0, "y": 14},
          "id": 5,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {
              "expr": "node_filesystem_size_bytes{fstype=\"zfs\",mountpoint!~\".*/.*/.+\"}",
              "legendFormat": "{{node}} {{mountpoint}} total",
              "refId": "A"
            },
            {
              "expr": "node_filesystem_avail_bytes{fstype=\"zfs\",mountpoint!~\".*/.*/.+\"}",
              "legendFormat": "{{node}} {{mountpoint}} free",
              "refId": "B"
            }
          ],
          "title": "ZFS Pool Capacity",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "mappings": [
                {"type": "value", "options": {"1": {"text": "ONLINE", "color": "green"}}},
                {"type": "value", "options": {"0": {"text": "OFFLINE", "color": "red"}}}
              ]
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 5, "x": 14, "y": 14},
          "id": 6,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto"
          },
          "targets": [
            {
              "expr": "node_zfs_zpool_state{state=\"online\"}",
              "legendFormat": "{{node}} {{zpool}}",
              "refId": "A"
            }
          ],
          "title": "ZFS Pool Health",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "blue", "value": null}]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 5, "x": 19, "y": 14},
          "id": 14,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "expr": "node_zfs_arc_size",
              "legendFormat": "ARC",
              "refId": "A"
            }
          ],
          "title": "ZFS ARC Size",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 10, "x": 14, "y": 18},
          "id": 15,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {
              "expr": "node_zfs_arc_size",
              "legendFormat": "ARC size",
              "refId": "A"
            },
            {
              "expr": "node_zfs_arc_memory_available_bytes",
              "legendFormat": "ARC available",
              "refId": "B"
            }
          ],
          "title": "ZFS ARC Size Over Time",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 22},
          "id": 17,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {
              "expr": "sum by (node, zpool) (rate(node_zfs_zpool_dataset_nread[5m]))",
              "legendFormat": "{{node}} {{zpool}} read",
              "refId": "A"
            },
            {
              "expr": "sum by (node, zpool) (rate(node_zfs_zpool_dataset_nwritten[5m]))",
              "legendFormat": "{{node}} {{zpool}} write",
              "refId": "B"
            }
          ],
          "title": "ZFS Pool I/O Throughput",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22},
          "id": 7,
          "title": "Ceph",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "fixed", "fixedColor": "blue"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 23},
          "id": 8,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "expr": "ceph_cluster_total_bytes",
              "legendFormat": "Total",
              "refId": "A"
            }
          ],
          "title": "Ceph Total",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "fixed", "fixedColor": "orange"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "orange", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 8, "x": 8, "y": 23},
          "id": 9,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "expr": "ceph_cluster_total_used_raw_bytes",
              "legendFormat": "Used (raw)",
              "refId": "A"
            }
          ],
          "title": "Ceph Used (raw)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "fixed", "fixedColor": "green"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 8, "x": 16, "y": 23},
          "id": 10,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto"
          },
          "targets": [
            {
              "expr": "ceph_cluster_total_bytes - ceph_cluster_total_used_raw_bytes",
              "legendFormat": "Available",
              "refId": "A"
            }
          ],
          "title": "Ceph Available",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 14, "x": 0, "y": 27},
          "id": 11,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "targets": [
            {
              "expr": "ceph_cluster_total_bytes",
              "legendFormat": "Total",
              "refId": "A"
            },
            {
              "expr": "ceph_cluster_total_used_raw_bytes",
              "legendFormat": "Used (raw)",
              "refId": "B"
            },
            {
              "expr": "ceph_cluster_total_bytes - ceph_cluster_total_used_raw_bytes",
              "legendFormat": "Available",
              "refId": "C"
            }
          ],
          "title": "Ceph Cluster Usage",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.7},
                  {"color": "red", "value": 0.9}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 10, "x": 14, "y": 27},
          "id": 12,
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "expr": "ceph_cluster_total_used_raw_bytes / ceph_cluster_total_bytes",
              "legendFormat": "Ceph Used %",
              "refId": "A"
            }
          ],
          "title": "Ceph Used % (Current)",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {"mode": "palette-classic"},
              "custom": {
                "drawStyle": "line",
                "lineWidth": 1,
                "fillOpacity": 10,
                "spanNulls": false,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 35},
          "id": 16,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "expr": "sum by (hostname) (ceph_osd_stat_bytes_avail * on(ceph_daemon) group_left(hostname) ceph_osd_metadata)",
              "legendFormat": "{{hostname}} free",
              "refId": "A"
            },
            {
              "expr": "sum by (hostname) (ceph_osd_stat_bytes * on(ceph_daemon) group_left(hostname) ceph_osd_metadata)",
              "legendFormat": "{{hostname}} total",
              "refId": "B"
            }
          ],
          "title": "Ceph Free Space per Node",
          "type": "timeseries"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 36,
      "style": "dark",
      "tags": ["storage", "disk"],
      "templating": {"list": []},
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Cluster Disk Usage",
      "uid": "cluster-disk-usage",
      "version": 1
    }
