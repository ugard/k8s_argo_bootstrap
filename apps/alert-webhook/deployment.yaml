---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-webhook
  namespace: monitoring
  labels:
    app: alert-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-webhook
  template:
    metadata:
      labels:
        app: alert-webhook
    spec:
      containers:
      - name: webhook
        # Rust, źródło: git.ugard.win/lkrzyzak/alert-webhook (build: Drone CI)
        image: registry.ugard.win/alert-webhook:64b22769
        ports:
        - containerPort: 5000
        env:
        # MQTT-only: alerty lecą na wewnętrzny broker (mqtt-internal),
        # stamtąd mostek xmpp-omemo-core podnosi je z alerts/# na Jabbera.
        - name: MQTT_BROKER
          value: "tcp://mosquitto.mqtt-internal.svc:1883"
        - name: MQTT_USERNAME
          value: "alert-webhook"
        - name: MQTT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: alert-webhook-mqtt
              key: MQTT_PASSWORD
        - name: RUST_LOG
          value: "info"
        readinessProbe:
          tcpSocket:
            port: 5000
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: alert-webhook
  namespace: monitoring
spec:
  selector:
    app: alert-webhook
  ports:
  - port: 80
    targetPort: 5000
