apiVersion: v1
kind: ServiceAccount
metadata:
  name: zrepl-healthcheck
  namespace: backup-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zrepl-healthcheck
  namespace: backup-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    # "get" is required in addition to "create": kube-rs (and modern kubectl)
    # exec over a WebSocket upgrade, which is an HTTP GET the API server
    # authorizes as verb "get" on pods/exec. "create" only covers the legacy
    # SPDY (HTTP POST) path. Without "get", the WebSocket upgrade returns
    # 403 "cannot get resource pods/exec" and the healthcheck fails.
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zrepl-healthcheck
  namespace: backup-system
subjects:
  - kind: ServiceAccount
    name: zrepl-healthcheck
    namespace: backup-system
roleRef:
  kind: Role
  name: zrepl-healthcheck
  apiGroup: rbac.authorization.k8s.io
---
# Healthcheck logic lives in the Rust binary at
# registry.ugard.win/zrepl-healthcheck (source:
# ssh://git@git.ugard.win/lkrzyzak/zrepl-healthcheck.git). It talks to the
# Kubernetes API via this ServiceAccount (kube-rs) instead of downloading
# kubectl at runtime. Behaviour and defaults match the old Python script.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: zrepl-healthcheck
  namespace: backup-system
spec:
  schedule: "0 * * * *" # Every hour
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: zrepl-healthcheck
          containers:
            - name: zrepl-healthcheck
              image: registry.ugard.win/zrepl-healthcheck:latest
              imagePullPolicy: Always
              env:
                - name: HC_PING_URL
                  value: "http://healthchecks.healthchecks.svc.cluster.local/ping/a5f49456-96db-4998-ae3c-accaa3dbf783"
          restartPolicy: OnFailure
