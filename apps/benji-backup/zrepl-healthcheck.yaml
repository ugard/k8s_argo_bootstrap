apiVersion: v1
kind: ServiceAccount
metadata:
  name: zrepl-healthcheck
  namespace: backup-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zrepl-healthcheck
  namespace: backup-system
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zrepl-healthcheck
  namespace: backup-system
subjects:
  - kind: ServiceAccount
    name: zrepl-healthcheck
    namespace: backup-system
roleRef:
  kind: Role
  name: zrepl-healthcheck
  apiGroup: rbac.authorization.k8s.io
---
# ConfigMap zrepl-healthcheck-script jest generowany przez configMapGenerator
# w kustomization.yaml z apps/benji-backup/zrepl-healthcheck.py (single source of
# truth). Nie wklejaj tu kopii skryptu.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: zrepl-healthcheck
  namespace: backup-system
spec:
  schedule: "0 * * * *" # Every hour
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: zrepl-healthcheck
          containers:
            - name: zrepl-healthcheck
              image: python:3-slim
              command: ["/bin/bash", "-c"]
              args:
                - |
                  apt-get update && apt-get install -y curl && \
                  curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" && \
                  chmod +x kubectl && \
                  mv kubectl /usr/local/bin/ && \
                  python /scripts/zrepl-healthcheck.py
              env:
                - name: HC_PING_URL
                  value: "http://healthchecks.healthchecks.svc.cluster.local/ping/a5f49456-96db-4998-ae3c-accaa3dbf783"
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: zrepl-healthcheck-script
          restartPolicy: OnFailure
