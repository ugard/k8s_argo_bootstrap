# Garage ZFS backup — model PULL (i8d-hmt = source/serwer, 95t-m8m = pull/klient).
# 95t inicjuje połączenie do source przez MetalLB VIP 192.168.10.210:8888.
# TLS: source prezentuje cert CN=prod i autoryzuje klienta CN=backups;
#      pull prezentuje cert CN=backups i weryfikuje serwer po server_cn=prod.
# SealedSecrety zrepl-prod / zrepl-backup: apps/benji-backup/sealed-secrets.yaml
# (regeneracja: scripts/create-zrepl-sealed-secret.sh). Zob. doc/backup/README.md sekcja 3.
apiVersion: v1
kind: ConfigMap
metadata:
  name: zrepl-garage-source
  namespace: backup-system
data:
  zrepl.yaml: |
    jobs:
    - name: garage_source
      type: source
      serve:
        type: tls
        listen: ":8888"
        ca: "/etc/zrepl/backups/tls.crt"
        cert: "/etc/zrepl/prod/tls.crt"
        key: "/etc/zrepl/prod/tls.key"
        client_cns:
          - "backups"
      filesystems: {
        "wdc/talos/pvc-027fb013-5710-4057-bd08-1d4865684077<": true,
        "wdc/talos/pvc-3a23bee9-37f3-4053-acea-1c615e4f0a20<": true
      }
      snapshotting:
        type: periodic
        prefix: zrepl_
        interval: 10m
      pruning:
        # not_replicated chroni snapshoty jeszcze niepobrane przez pull
        # (kluczowe gdy 95t bywa offline); last_n to zapas na sourcie.
        keep:
        - type: not_replicated
        - type: last_n
          count: 10
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zrepl-garage-pull
  namespace: backup-system
data:
  zrepl.yaml: |
    jobs:
    - name: garage_pull
      type: pull
      connect:
        type: tls
        address: "192.168.10.210:8888"
        ca: "/etc/zrepl/prod/tls.crt"
        cert: "/etc/zrepl/backups/tls.crt"
        key: "/etc/zrepl/backups/tls.key"
        server_cn: "prod"
      root_fs: "wdc/zrepl/garage"
      interval: 10m
      recv:
        placeholder:
          encryption: off
      pruning:
        keep_sender:
        - type: not_replicated
        - type: last_n
          count: 10
        keep_receiver:
        - type: grid
          grid: 1x1h(keep=all) | 24x1h | 30x1d | 6x30d
          regex: "^zrepl_"
---
apiVersion: v1
kind: Service
metadata:
  name: zrepl-source
  namespace: backup-system
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.10.210
spec:
  selector:
    app: zrepl-garage-source
  ports:
  - protocol: TCP
    port: 8888
    targetPort: 8888
    name: zrepl
  type: LoadBalancer
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zrepl-garage-source
  namespace: backup-system
spec:
  selector:
    matchLabels:
      app: zrepl-garage-source
  template:
    metadata:
      labels:
        app: zrepl-garage-source
    spec:
      nodeSelector:
        kubernetes.io/hostname: talos-i8d-hmt
      containers:
        - name: zrepl
          image: registry.ugard.win/zrepl:latest
          volumeMounts:
            - name: config
              mountPath: /etc/zrepl/zrepl.yaml
              subPath: zrepl.yaml
            - name: zrepl-backup
              mountPath: /etc/zrepl/backups
              readOnly: true
            - name: zrepl-prod
              mountPath: /etc/zrepl/prod
              readOnly: true
          securityContext:
            privileged: true
      volumes:
        - name: config
          configMap:
            name: zrepl-garage-source
        - name: zrepl-prod
          secret:
            secretName: zrepl-prod
        - name: zrepl-backup
          secret:
            secretName: zrepl-backup
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: zrepl-garage-pull
  namespace: backup-system
spec:
  selector:
    matchLabels:
      app: zrepl-garage-pull
  template:
    metadata:
      labels:
        app: zrepl-garage-pull
    spec:
      nodeSelector:
        openebs.io/nodeid: talos-95t-m8m
      containers:
        - name: zrepl
          image: registry.ugard.win/zrepl:latest
          volumeMounts:
            - name: config
              mountPath: /etc/zrepl/zrepl.yaml
              subPath: zrepl.yaml
            - name: zrepl-backup
              mountPath: /etc/zrepl/backups
              readOnly: true
            - name: zrepl-prod
              mountPath: /etc/zrepl/prod
              readOnly: true
          securityContext:
            privileged: true
      volumes:
        - name: config
          configMap:
            name: zrepl-garage-pull
        - name: zrepl-prod
          secret:
            secretName: zrepl-prod
        - name: zrepl-backup
          secret:
            secretName: zrepl-backup
