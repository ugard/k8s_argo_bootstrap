apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: mqtt-internal
  labels:
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/part-of: mqtt-internal
spec:
  type: ClusterIP
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
      protocol: TCP
  selector:
    app.kubernetes.io/name: mosquitto
