apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: zfs-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus-stack
    release: prometheus
spec:
  groups:
  - name: zfs
    rules:
    - alert: ZFSPoolDegraded
      expr: node_zfs_zpool_state{state="degraded"} == 1
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} is degraded"
        description: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} is in DEGRADED state. A resilver or repair may be in progress."
    - alert: ZFSPoolUnhealthy
      expr: node_zfs_zpool_state{state=~"faulted|unavail|suspended"} == 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} is unhealthy"
        description: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} has been in state {{ $labels.state }} for 5 minutes."
