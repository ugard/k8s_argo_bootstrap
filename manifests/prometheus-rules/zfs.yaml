apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: zfs-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus-stack
    release: prometheus
spec:
  groups:
  - name: zfs
    rules:
    - alert: ZFSPoolResilivering
      expr: node_zfs_zpool_state{state="DEGRADED"} == 1 or node_zfs_zpool_state{state="FAULTED"} == 1
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} is degraded/faulted"
        description: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} is in state {{ $labels.state }}. A resilver or repair may be in progress."
    - alert: ZFSPoolUnhealthy
      expr: node_zfs_zpool_state{state!="ONLINE"} == 1
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} is not ONLINE"
        description: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} has been in state {{ $labels.state }} for 5 minutes."
    - alert: ZFSResilverInProgress
      expr: node_zfs_zpool_scrub_state{scrub_type="resilver"} == 1
      for: 0m
      labels:
        severity: info
      annotations:
        summary: "ZFS resilver in progress on {{ $labels.instance }}"
        description: "ZFS pool {{ $labels.zpool }} on {{ $labels.instance }} is currently resilvering."
