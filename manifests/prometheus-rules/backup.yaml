apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backup-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus-stack
    release: prometheus
spec:
  groups:
  - name: backup
    rules:
    - alert: ZreplHealthcheckJobFailed
      expr: kube_job_status_failed{namespace="backup-system", job_name=~"zrepl-healthcheck.*"} > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "zrepl healthcheck job failed"
        description: "Job {{ $labels.job_name }} in backup-system has failed - zrepl replication may be broken."
    - alert: ZreplHealthcheckNotScheduled
      expr: time() - kube_cronjob_status_last_schedule_time{namespace="backup-system", cronjob="zrepl-healthcheck"} > 7200
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "zrepl healthcheck cronjob not running"
        description: "zrepl-healthcheck has not been scheduled in over 2 hours."
    - alert: ZreplGarageSourcePodMissing
      expr: kube_daemonset_status_number_ready{namespace="backup-system", daemonset="zrepl-garage-source"} == 0
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "zrepl-garage-source pod not running"
        description: "DaemonSet zrepl-garage-source (i8d-hmt) has no ready pods in backup-system - backup source is not serving, pull cannot replicate."
    - alert: ZreplGaragePullPodMissing
      expr: kube_daemonset_status_number_ready{namespace="backup-system", daemonset="zrepl-garage-pull"} == 0
      for: 10m
      labels:
        severity: critical
      annotations:
        summary: "zrepl-garage-pull pod not running"
        description: "DaemonSet zrepl-garage-pull (95t-m8m) has no ready pods in backup-system - backup replication is not running."
